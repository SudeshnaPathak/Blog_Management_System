# Test-specific properties
# Let Hibernate create/drop schema for embedded H2 used by @DataJpaTest
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway migrations for slice/unit tests that run H2 in-memory
spring.flyway.enabled=false

# Ensure SQL init doesn't try to run production SQL on test DB
spring.sql.init.mode=never

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.show_sql=false