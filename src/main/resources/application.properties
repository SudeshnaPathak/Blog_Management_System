spring.application.name=Blog Management System
logging.level.org.springframework=INFO

# DB Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/blog_management_system}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:blog_admin}
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
#Check N+1 query
spring.jpa.properties.hibernate.generate_statistics=true
#Enable SQL initialization for non-embedded databases
spring.sql.init.mode=always

#Enable Actuator Endpoints
management.endpoints.web.exposure.include=*
#increase the number of processes available for scheduling
spring.task.scheduling.pool.size=5

# Server Configuration
server.servlet.context-path=/api/v1
server.port=8081

# Swagger Configuration
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Security Configuration
#jwt.secretKey=${JWT_SECRET_KEY}
jwt.secretKey=SZ7VZXSzB3ewqQR5vEAKE7FjKKLeeFhUnrsTYCPQrfq

# Frontend URL
app.base.url=${FRONTEND_URL:http://localhost:8081/api/v1}

# Scheduling Configuration
blog.schedulers.userDeletion.cron=0 0 0 * * *
blog.schedulers.viewSync.cron=0 */5 * * * *
blog.schedulers.publishPost.cron=0 * * * * *

# Data Compression
server.compression.enabled=true

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Freemarker Configuration
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftlh
spring.freemarker.content-type=text/plain

# Sender address
app.mail.from=${MAIL_FROM:subhojitgdsc7@gmail.com}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:blog_redis}

