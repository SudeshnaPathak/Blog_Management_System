input {
  beats {
    port => 5044
  }
}

filter {
  json {
    source => "message"
    target => "log_data"
  }

  if [log_data][requestId] {
    mutate {
      add_field => {
        "requestId"   => "%{[log_data][requestId]}"
        "userId"      => "%{[log_data][userId]}"
        "userEmail"   => "%{[log_data][userEmail]}"
        "httpMethod"  => "%{[log_data][httpMethod]}"
        "requestUri"  => "%{[log_data][requestUri]}"
        "level"       => "%{[log_data][level]}"
        "logger_name" => "%{[log_data][logger_name]}"
        "app_name"    => "%{[log_data][app_name]}"
      }
    }
  }

  date {
    match => ["[log_data][@timestamp]", "ISO8601"]
    target => "@timestamp"
  }

# ── Enrich: add environment tag ──
#   mutate {
#      add_field => {
#        "environment" => "${ENVIRONMENT:development}"
#      }
#    }

# ── Tag security events for easy Kibana filtering ──
#  if [logger_name] =~ "Security" {
#    mutate { add_tag => ["security_event"] }
#  }

  # ── Drop noisy health-check requests (Actuator pings from Docker) ──
  if [requestURI] =~ "/actuator/health" {
    drop {}
  }

  mutate {
    remove_field => ["message", "log_data", "agent", "ecs", "input", "log", "host"]
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "blog-logs-%{+YYYY.MM.dd}"
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    retry_on_conflict => 3
  }

  # Debug: also print to Logstash stdout (disable in production)
   stdout { codec => rubydebug }
}